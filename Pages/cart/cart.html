<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>
    <link rel="stylesheet" href="../../style.css" />
  </head>
  <body>
    <!--This Is Header-->
    <header>
      <div class="left-side">
        <div class="logo">
          <img src="../../images/Nlogo.png" alt="HandMade Logo" />
        </div>

        <ul class="nav_links">
          <li><a href="../../index.html">Home</a></li>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Service</a></li>
        </ul>
      </div>

      <div class="right-side">
        <a href="#" class="login-btn">Login</a>
        <a href="#" class="login-btn">Sign Up</a>
      </div>
    </header>

    <div class="cart-container">
      <h2>Cart</h2>
      <div class="cart-items">
        <div class="cart-item">
          <img src="../../images/bags/bag.png" alt="Bag Picture" />

          <div class="product-info">
            <h3>Handmade Bag</h3>

            <p>Beautiful handmade bag with elegant design.</p>
          </div>

          <div class="quantity">
            <button>-</button>
            <span>1</span>
            <button>+</button>
          </div>

          <h4>$80</h4>
        </div>

        <!-- Product 2 -->
        <div class="cart-item">
          <img src="../../images/dresses/dress.png" alt="Dress Picture" />

          <div class="product-info">
            <h3>Handmade Dress</h3>

            <p>Elegant handmade dress for special occasions.</p>
          </div>

          <div class="quantity">
            <button>-</button>
            <span>1</span>
            <button>+</button>
          </div>

          <h4>$80</h4>
        </div>
      </div>
    </div>
    <div class="cart-summary">
      <div class="summary-row">
        <p>Subtotal</p>
        <p>$220</p>
      </div>

      <div class="summary-row">
        <p>Shipping</p>
        <p>Free</p>
      </div>

      <div class="summary-row total">
        <h3>Total</h3>
        <h3>$220</h3>
      </div>

      <button class="checkout-btn">Check Out</button>
    </div>
  </body>
</html>
