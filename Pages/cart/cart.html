<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="../../CSS/cart.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    
  </head>
  <body>
    <!--This Is Header-->
    <header>
      <div class="left-side">
        <div class="logo">
          <img src="../../images/Nlogo.png" alt="HandMade Logo" />
        </div>

        <ul class="nav_links">
          <li><a href="../../index.html">Home</a></li>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Service</a></li>
        </ul>
      </div>

      <div class="right-side">
        <a href="Pages/Authentication/login.html" class="login-btn">Login</a>
        <a href="Pages/Authentication/signin.html" class="login-btn">Sign Up</a>

        

        <div class="user-icons" id="userIcons">
          <a href="Pages/cart/cart.html">
            <i class="fa-solid fa-cart-shopping"></i>
            
          </a>

          <i class="fa-solid fa-user"></i>
        </div>
        <button id="logoutBtn" class="logout-btn">Logout</button>
      </div>
    </header>

    <div class="cart-container">
      <h2>Cart</h2>
      <div class="cart-items">
        <div class="cart-item" data-price="20">
          <img src="../../images/bags/bag.png" alt="Bag Picture" />

          <div class="product-info">
            <h3>Handmade Bag</h3>

            <p>Beautiful handmade bag with elegant design.</p>

            <h5 class="item_price">20$</h5>
          </div>

          <div class="quantity">
            <button>-</button>
            <span>1</span>
            <button>+</button>
          </div>

          <h4 class="total-price">$20</h4>
        </div>

        <!-- Product 2 -->
        <div class="cart-item" data-price="20">
          <img src="../../images/dresses/dress.png" alt="Dress Picture" />

          <div class="product-info">
            <h3>Handmade Dress</h3>

            <p>Elegant handmade dress for special occasions.</p>
            <h5 class="item_price">20$</h5>
          </div>

          <div class="quantity">
            <button>-</button>
            <span>1</span>
            <button>+</button>
          </div>

          <h4 class="total-price">$20</h4>
        </div>
      </div>
    </div>
    <div class="cart-summary">
      <div class="summary-row">
        <p >Subtotal</p>
        <p class="subtotal-price">$40</p>
      </div>

      <div class="summary-row">
        <p>Shipping</p>
        <p class="free">Free</p>
      </div>

      <div class="summary-row total">
        <h3 >Total</h3>
        <h3 class="final-total">$40</h3>
      </div>

      <button class="checkout-btn buy-now-btn">Check Out</button>
    </div>
     <script src="../../main.js"></script>
  </body>
</html>
